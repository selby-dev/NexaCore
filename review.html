<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexaCore Reviews</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 0;
    }

    header {
      background: #020617;
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      color: #38bdf8;
    }

    .container {
      max-width: 800px;
      margin: 20px auto;
      padding: 20px;
    }

    .card {
      background: #020617;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    input, textarea, select {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #38bdf8;
      color: black;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #0ea5e9;
    }

    .review {
      border-bottom: 1px solid #1e293b;
      padding: 10px 0;
    }

    .stars {
      color: gold;
    }
  </style>
  <link rel="stylesheet"
    href="styles.css">
</head>
<header>
<img src="NexaCore Logo.png" alt="NexaCore Logo">
</header>
<body>

<header>NexaCore Reviews</header>

<div class="container">

  <!-- REVIEW FORM -->
  <div class="card">
    <h2>Leave a Review</h2>
    <input type="text" id="name" placeholder="Your Name">
    <textarea id="review" placeholder="Write your review..."></textarea>

    <label>Rating:</label>
    <select id="rating">
      <option value="5">★★★★★ (5)</option>
      <option value="4">★★★★☆ (4)</option>
      <option value="3">★★★☆☆ (3)</option>
      <option value="2">★★☆☆☆ (2)</option>
      <option value="1">★☆☆☆☆ (1)</option>
    </select>

    <button onclick="addReview()">Submit Review</button>
  </div>

  <!-- DISPLAY REVIEWS -->
  <div class="card">
    <h2>Customer Reviews</h2>
    <div id="reviews"></div>
  </div>

</div>

<script>
  function addReview() {
    const name = document.getElementById('name').value;
    const reviewText = document.getElementById('review').value;
    const rating = document.getElementById('rating').value;

    if (!name || !reviewText) {
      alert('Please fill in all fields');
      return;
    }

    const review = {
      name,
      reviewText,
      rating
    };

    let reviews = JSON.parse(localStorage.getItem('reviews')) || [];
    reviews.push(review);
    localStorage.setItem('reviews', JSON.stringify(reviews));

    displayReviews();

    document.getElementById('name').value = '';
    document.getElementById('review').value = '';
  }

  function displayReviews() {
    const reviewsDiv = document.getElementById('reviews');
    reviewsDiv.innerHTML = '';

    let reviews = JSON.parse(localStorage.getItem('reviews')) || [];

    reviews.reverse().forEach(r => {
      const div = document.createElement('div');
      div.classList.add('review');

      let stars = '★'.repeat(r.rating) + '☆'.repeat(5 - r.rating);

      div.innerHTML = `
        <strong>${r.name}</strong><br>
        <span class="stars">${stars}</span>
        <p>${r.reviewText}</p>
      `;

      reviewsDiv.appendChild(div);
    });
  }

  displayReviews();
</script>
<button onclick="location.href='index.html';">Home</button>
    <footer>
    <p>© 2026 NexaCore Solutions</p>
    </footer>
</body>
</html>
